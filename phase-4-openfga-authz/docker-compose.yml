name: lab-iam-phase4

networks:
  openfga:

services:
  postgres:
    image: postgres:17-alpine
    container_name: openfga-postgres
    networks:
      - openfga
    ports:
      - "5433:5432"   # 5433 pour ne pas entrer en conflit avec le postgres de la Phase 1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${OPENFGA_POSTGRES_PASSWORD:-password}
    volumes:
      - openfga_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: openfga/openfga:latest
    container_name: openfga-migrate
    depends_on:
      postgres:
        condition: service_healthy
    command: migrate
    environment:
      - OPENFGA_DATASTORE_ENGINE=postgres
      - OPENFGA_DATASTORE_URI=postgres://postgres:${OPENFGA_POSTGRES_PASSWORD:-password}@postgres:5432/postgres?sslmode=disable
    networks:
      - openfga

  openfga:
    image: openfga/openfga:latest
    container_name: openfga
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: run
    environment:
      - OPENFGA_DATASTORE_ENGINE=postgres
      - OPENFGA_DATASTORE_URI=postgres://postgres:${OPENFGA_POSTGRES_PASSWORD:-password}@postgres:5432/postgres?sslmode=disable
      - OPENFGA_PLAYGROUND_ENABLED=true
    ports:
      - "8081:8080"   # API HTTP (décalé pour ne pas entrer en conflit avec Keycloak sur 8080)
      - "8082:8081"   # API gRPC
      - "3001:3000"   # Playground web
    networks:
      - openfga

volumes:
  openfga_postgres_data:
