name: lab-iam-phase2

services:
  lldap:
    image: lldap/lldap:stable
    container_name: lldap
    restart: unless-stopped
    ports:
      - "3890:3890"     # LDAP (non chiffré -- réseau de lab uniquement)
      - "6360:6360"     # LDAPS
      - "17170:17170"   # interface web d'administration LLDAP
    environment:
      UID: 1000
      GID: 1000
      TZ: Europe/Paris
      LLDAP_JWT_SECRET: ${LLDAP_JWT_SECRET:?generate-a-random-secret}
      LLDAP_KEY_SEED: ${LLDAP_KEY_SEED:?generate-a-random-seed}
      LLDAP_LDAP_USER_PASS: ${LLDAP_ADMIN_PASSWORD:-change-me}
      LLDAP_LDAP_BASE_DN: ${LLDAP_BASE_DN:-dc=lab-iam,dc=local}
    volumes:
      - lldap_data:/data
    networks:
      - iam

networks:
  iam:
    external: true
    name: lab-iam-phase1_iam   # rejoint le réseau créé par la Phase 1

volumes:
  lldap_data:
